<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>訴月記 · CSS 美化工坊</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   EDITOR SHELL — 工坊整体框架
═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0e0e10;
  --bg2: #141416;
  --bg3: #1c1c1f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8e6;
  --text2: #9a9a9e;
  --text3: #5a5a5e;
  --lime: #d4ff4d;
  --blue: #5b7cfa;
  --coral: #ff6b6b;
  --mint: #43d9a0;
  --pink: #fa5bd5;
  --amber: #ff9f43;
  --purple: #a78bfa;
  --section-w: 780px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Page Header ── */
.page-header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(14,14,16,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.page-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.page-title-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--lime);
  display: inline-block;
}
.page-title-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-style: normal;
  margin-top: 2px;
}
.page-header-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.hdr-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: 0.18s;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--lime); color: var(--lime); }
.hdr-btn.primary { background: var(--lime); color: #0a0a0a; border-color: var(--lime); }
.hdr-btn.primary:hover { opacity: 0.85; }
.hdr-btn i { font-size: 10px; }

/* ── Page Body ── */
.page-body {
  max-width: var(--section-w);
  margin: 0 auto;
  padding: 32px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

/* ── Big Group (Section) ── */
.big-group {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.big-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.big-group-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.big-group-num {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.18em;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 5px;
}
.big-group-name {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--text);
}
.big-group-actions { display: flex; gap: 6px; }

/* ── Small Group (Item) ── */
.small-group {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 14px;
}
.small-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.small-group-title {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 7px;
}
.small-group-title i { font-size: 9px; opacity: 0.7; }
.small-group-actions { display: flex; gap: 5px; flex-shrink: 0; }
.sg-btn {
  height: 24px;
  padding: 0 9px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text3);
  font-size: 9px;
  font-family: 'Geist Mono', monospace;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: 0.15s;
  white-space: nowrap;
}
.sg-btn:hover { border-color: var(--border2); color: var(--text); }
.sg-btn.copy-default:hover { border-color: var(--blue); color: var(--blue); }
.sg-btn.copy-current:hover { border-color: var(--lime); color: var(--lime); }
.sg-btn i { font-size: 8px; }

/* CSS Editor */
.css-editor-wrap {
  position: relative;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.css-editor-label {
  font-family: 'Geist Mono', monospace;
  font-size: 8px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 7px 14px 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.css-editor-label::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--coral);
  box-shadow: 10px 0 0 var(--amber), 20px 0 0 var(--mint);
}
.css-textarea {
  width: 100%;
  min-height: 130px;
  background: transparent;
  border: none;
  outline: none;
  padding: 6px 14px 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 11.5px;
  color: #c9d1d9;
  line-height: 1.7;
  resize: vertical;
  tab-size: 2;
  white-space: pre;
  overflow-x: auto;
}
.css-textarea::placeholder { color: var(--text3); }
.css-textarea::-webkit-scrollbar { height: 3px; }

/* Preview Area */
.preview-wrap {
  background: var(--bg3);
  border-top: 1px solid var(--border);
}
.preview-label {
  font-family: 'Geist Mono', monospace;
  font-size: 8px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 8px 14px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.preview-label i { font-size: 8px; color: var(--mint); }

/* ── Phone Preview Shell ── */
.phone-shell {
  margin: 0 14px 14px;
  background: #fafaf7;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 8px 32px -8px rgba(0,0,0,0.5);
}

/* ── Chat preview inside phone ── */
.chat-preview {
  padding: 10px 12px 14px;
  background: #fafaf7;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.preview-row-both {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-items: flex-start;
}
.preview-col-label {
  font-family: 'Geist Mono', monospace;
  font-size: 7.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #8a8a8e;
  margin-bottom: 5px;
  text-align: center;
}

/* ── TOAST notification ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1c1c1f;
  border: 1px solid var(--border2);
  color: var(--lime);
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 100px;
  letter-spacing: 0.06em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─────────────────────────────
   TSUKIPHONE CSS VARIABLES
   injected into previews
───────────────────────────── */
.tsuki-scope {
  --ink: #0a0a0a;
  --ink-2: #1f1f20;
  --ink-3: #4a4a4d;
  --mute: #8a8a8e;
  --line: rgba(10,10,10,0.06);
  --paper: #fafaf7;
  --paper-2: #f1f0ea;
  --card: #ffffff;
  --accent-lime: #d4ff4d;
  --accent-blue: #5b7cfa;
  --accent-pink: #fa5bd5;
  --accent-coral: #ff6b6b;
  --accent-amber: #ff9f43;
  --accent-mint: #43d9a0;
  font-family: 'Geist', sans-serif;
}

/* ── divider between small groups ── */
.sg-divider {
  height: 1px;
  background: var(--border);
  margin: 0 0 14px;
  display: none;
}
</style>
</head>
<body>

<!-- ════════════════════════════
     PAGE HEADER
════════════════════════════ -->
<div class="page-header">
  <div class="page-title">
    <div>
      <div>訴月記 CSS 美化工坊<span class="page-title-dot" style="margin-left:8px"></span></div>
      <div class="page-title-sub">Real-time Style Editor</div>
    </div>
  </div>
  <div class="page-header-actions">
    <button class="hdr-btn" onclick="exportAll('default')">
      <i class="fa-solid fa-file-export"></i> 导出默认 CSS
    </button>
    <button class="hdr-btn primary" onclick="exportAll('current')">
      <i class="fa-solid fa-file-arrow-down"></i> 导出当前 CSS
    </button>
  </div>
</div>

<!-- ════════════════════════════
     PAGE BODY
════════════════════════════ -->
<div class="page-body" id="pageBody"></div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fa-solid fa-check"></i> <span id="toastMsg">已复制</span></div>

<!-- ════════════════════════════
     FONT AWESOME (previews need it too)
════════════════════════════ -->

   DATA — 所有小组的定义
══════════════════════════════════════════════════ */

// previewHTML 里用 {SCOPE} 代替 scoped class name

const SECTIONS = [

    },

  align-items: flex-end;

  z-index: 2;

.char-avatar {

  height: 78px;

  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;

}

  letter-spacing: 0.18em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.char-label::before {
  content: '';
  width: 14px;
  height: 1px;
  background: var(--ink);

  font-size: 6px;

  letter-spacing: 0.1em;

    ${msgRow('char',`<div class="bubble gift"><div class="gift-head"><span><i class="fa-solid fa-gift" style="font-size:9px"></i> GIFT · FOR YOU</span><span>#00601</span></div><div class="gift-mystery"><div class="gift-mystery-icon"><i class="fa-solid fa-envelope-open-text"></i></div><div><div class="gift-mystery-label">给你的礼物</div><div class="gift-mystery-sub">tap to unwrap ✉️</div></div></div><div class="gift-foot"><span>TAP TO OPEN</span><span><i class="fa-solid fa-hand-pointer"></i> view</span></div></div>`,'')}
    <div style="font-family:'Geist Mono',monospace;font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8a8a8e;text-align:center;margin:4px 0 2px;">用户 · USER</div>
    ${msgRow('user',`<div class="bubble gift"><div class="gift-head"><span><i class="fa-solid fa-gift" style="font-size:9px"></i> GIFT · SENT</span><span>#00520</span></div><div class="gift-mystery"><div class="gift-mystery-icon"><i class="fa-solid fa-gift"></i></div><div><div class="gift-mystery-label">有一份礼物</div><div class="gift-mystery-sub">待查收 · tap to open</div></div></div><div class="gift-foot"><span>TAP TO OPEN</span><span><i class="fa-solid fa-hand-pointer"></i> view</span></div></div>`,'')}
  </div>`,

  bubbleCallPreview: `

    <div style="font-family:'Geist Mono',monospace;font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8a8a8e;text-align:center;margin-bottom:2px;">角色 · CHAR</div>
    ${msgRow('char',`<div class="bubble call-invite"><div class="call-invite-icon voice"><i class="fa-solid fa-phone"></i></div><div class="call-invite-info"><div class="call-invite-label">语音通话邀请</div><div class="call-invite-sub">VOICE CALL · RINGING</div></div><button class="call-invite-btn">接听</button></div>`,'')}
    <div style="font-family:'Geist Mono',monospace;font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8a8a8e;text-align:center;margin:4px 0 2px;">用户 · USER</div>
    ${msgRow('user',`<div class="bubble call-invite"><div class="call-invite-icon video"><i class="fa-solid fa-video"></i></div><div class="call-invite-info"><div class="call-invite-label">视频通话邀请</div><div class="call-invite-sub">VIDEO CALL · RINGING</div></div><button class="call-invite-btn">接听</button></div>`,'')}

  bubbleSystemPreview: `

  inputPreview: `

        <input class="input-field" type="text" placeholder="say something to char…" readonly/>
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Geist Mono',monospace;font-size:9px;color:#8a8a8e;pointer-events:none;">EN/中</span>
      </div>
      <button class="deco-btn"><i class="fa-solid fa-face-laugh-beam"></i></button>

/* ══════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════ */

// store: { groupId -> { textarea, defaultCSS, styleEl } }
const STORE = {};

function buildWaveHTML(id) {
  const heights = [4,7,10,13,10,7,4,10,13,7,4,10,7];
  return heights.map((h,i) =>
    `<span style="width:2.5px;height:${h}px;background:currentColor;border-radius:2px;opacity:0.35;display:inline-block;"></span>`
  ).join('');
}

function renderAll() {
  const body = document.getElementById('pageBody');
  body.innerHTML = '';

  SECTIONS.forEach(section => {
    const secEl = document.createElement('div');
    secEl.className = 'big-group';
    secEl.id = 'sec-' + section.id;

    // ── Section Header
    const hdr = document.createElement('div');
    hdr.className = 'big-group-header';
    hdr.innerHTML = `
      <div class="big-group-title">
        <span class="big-group-num">${section.num}</span>
        <span class="big-group-name">${section.title}</span>
      </div>`;
    secEl.appendChild(hdr);

    // ── For shared-preview sections (top card, input)
    if (section.sharedPreview) {
      // render all small groups (editors only, no individual previews)
      section.groups.forEach(grp => {
        secEl.appendChild(buildSmallGroup(grp, false));
      });
      // single shared preview
      const previewWrap = document.createElement('div');
      previewWrap.className = 'small-group';
      previewWrap.innerHTML = `
        <div class="preview-wrap">
          <div class="preview-label"><i class="fa-solid fa-eye"></i> LIVE PREVIEW</div>
          <div class="phone-shell" id="preview-${section.id}">
            <div class="tsuki-scope chat-preview">
              ${PREVIEW_HTML[section.previewFn]}
            </div>
          </div>
        </div>`;
      secEl.appendChild(previewWrap);

      // ★ 先挂载到 DOM，再查找元素
      body.appendChild(secEl);

      // init style elements for each group in section
      section.groups.forEach(grp => {
        const ta = document.getElementById('ta-' + grp.id);
        const styleEl = document.createElement('style');
        styleEl.id = 'style-' + grp.id;
        document.head.appendChild(styleEl);
        STORE[grp.id] = { textarea: ta, defaultCSS: grp.defaultCSS, styleEl };
        ta.addEventListener('input', () => updateStyle(grp.id));
        updateStyle(grp.id);
      });

    } else {
      // ── bubbles section: each small group has its own preview
      // ★ 先把 secEl 挂到 DOM
      body.appendChild(secEl);

      section.groups.forEach(grp => {
        const sgEl = buildSmallGroup(grp, true);
        secEl.appendChild(sgEl);
        const styleEl = document.createElement('style');
        styleEl.id = 'style-' + grp.id;
        document.head.appendChild(styleEl);
        // ★ 此时 sgEl 已在 DOM 中，getElementById 能正确找到
        const ta = document.getElementById('ta-' + grp.id);
        STORE[grp.id] = { textarea: ta, defaultCSS: grp.defaultCSS, styleEl };
        ta.addEventListener('input', () => updateStyle(grp.id));
        updateStyle(grp.id);
      });
    }
  });

  // fill voice wave bars
  document.querySelectorAll('[id^="vw"]').forEach(el => {
    el.innerHTML = buildWaveHTML();
  });
}

function buildSmallGroup(grp, withPreview) {
  const el = document.createElement('div');
  el.className = 'small-group';
  el.id = 'sg-' + grp.id;

  el.innerHTML = `
    <div class="small-group-header">
      <div class="small-group-title">
        <i class="${grp.icon}"></i>
        ${grp.label}
      </div>
      <div class="small-group-actions">
        <button class="sg-btn copy-default" onclick="copySG('${grp.id}','default')" title="复制默认代码">
          <i class="fa-regular fa-copy"></i> 默认
        </button>
        <button class="sg-btn copy-current" onclick="copySG('${grp.id}','current')" title="复制当前代码">
          <i class="fa-solid fa-wand-magic-sparkles"></i> 当前
        </button>
      </div>
    </div>
    <div class="css-editor-wrap">
      <div class="css-editor-label"></div>
      <textarea class="css-textarea" id="ta-${grp.id}" spellcheck="false">${grp.defaultCSS}</textarea>
    </div>
    ${withPreview ? `
    <div class="preview-wrap">
      <div class="preview-label"><i class="fa-solid fa-eye"></i> LIVE PREVIEW</div>
      <div class="phone-shell" id="preview-${grp.id}">
        <div class="tsuki-scope chat-preview">
          ${PREVIEW_HTML[grp.previewFn] || ''}
        </div>
      </div>
    </div>` : ''}
  `;
  return el;
}

function updateStyle(groupId) {
  const { textarea, styleEl } = STORE[groupId];
  // Scope all CSS to .tsuki-scope to prevent leaking into the editor UI
  const raw = textarea.value;
  const scoped = raw.replace(/(^|\})\s*([^{}@][^{]*)\s*\{/g, (match, before, selector) => {
    const sel = selector.trim();
    if (!sel) return match;
    // handle multi-selectors
    const scopedSel = sel.split(',').map(s => `.tsuki-scope ${s.trim()}`).join(', ');
    return `${before} ${scopedSel} {`;
  });
  styleEl.textContent = scoped;
}

/* ══════════════════════════════════════════════════
   COPY FUNCTIONS
══════════════════════════════════════════════════ */

function copySG(groupId, mode) {
  const { textarea, defaultCSS } = STORE[groupId];
  const text = mode === 'default' ? defaultCSS : textarea.value;
  navigator.clipboard.writeText(text).then(() => {
    showToast(mode === 'default' ? '已复制默认代码' : '已复制当前代码');
  });
}

function exportAll(mode) {
  const all = SECTIONS.flatMap(s => s.groups).map(g => {
    const css = mode === 'default'
      ? g.defaultCSS
      : (STORE[g.id] ? STORE[g.id].textarea.value : g.defaultCSS);
    return `/* ════════════════════════\n   ${g.label}\n════════════════════════ */\n${css}`;
  }).join('\n\n');

  const filename = mode === 'default'
    ? 'tsuki_css_default.txt'
    : 'tsuki_css_current.txt';

  const blob = new Blob([all], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast(`已导出 ${filename}`);
}

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
renderAll();
</script>
